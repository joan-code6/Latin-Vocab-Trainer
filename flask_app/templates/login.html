{% extends "layout.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Willkommen zurück</h1>
            <p>Melde dich an, um zu lernen</p>
        </div>
        
        <form action="" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" name="username" id="username" required placeholder="Dein Benutzername">
            </div>
            
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" name="password" id="password" required placeholder="Dein Passwort">
            </div>
            
            <button type="submit" class="auth-btn">Anmelden</button>
        </form>
        
        <div class="auth-footer">
            <p>Noch kein Konto? <a href="{{ url_for('register') }}">Registrieren</a></p>
        </div>
    </div>
</div>
{% endblock %}
